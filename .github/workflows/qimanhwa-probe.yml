name: qimanhwa-probe

# Manual-only diagnostic. Answers one question: when the request originates from
# a GitHub-hosted (Azure datacenter) IP instead of the Zscaler-filtered corporate
# network, does qimanhwa.com let us through, or does its Cloudflare challenge/block
# the datacenter IP?
#
# Zscaler is irrelevant here (GitHub runners are off the corporate network), so a
# non-200 result means Cloudflare, not Katim's AUP. manhwanex.com is the control:
# it has no Cloudflare and should always be 200.
#
# Run from the Actions tab → "qimanhwa-probe" → "Run workflow".

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — curl probe. Fast verdict on Cloudflare's posture toward GitHub IPs.
  # ---------------------------------------------------------------------------
  curl-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Show runner egress IP (the IP Cloudflare sees)
        run: |
          echo "Runner public IP:"
          curl -s --max-time 15 https://api.ipify.org || echo "(could not determine)"
          echo

      - name: Probe sites (default UA + browser UA)
        run: |
          BROWSER_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"

          probe() {
            local label="$1" url="$2" ua="$3"
            echo "==================================================================="
            echo "[$label] GET $url"
            echo "  UA: ${ua:0:40}..."
            local body="/tmp/${label}.html"
            # -s silent, -S show errors, follow no redirects so we see CF's own response
            local code
            code=$(curl -sS -o "$body" --max-time 30 \
                     -H "User-Agent: $ua" \
                     -H "Accept: text/html,application/xhtml+xml" \
                     -w "%{http_code}" "$url" 2>/tmp/err."$label" || echo "000")
            local size; size=$(wc -c < "$body" 2>/dev/null | tr -d ' ')
            echo "  status=$code  body_bytes=${size:-0}"

            echo "  --- response headers ---"
            curl -sS -I --max-time 30 -H "User-Agent: $ua" "$url" 2>/dev/null \
              | grep -iE "^HTTP|server:|cf-ray:|cf-mitigated:|cf-cache-status:|cf-chl|retry-after:|via:|content-type:" \
              | sed 's/^/    /' || true

            echo "  --- classification ---"
            if [ "$code" = "000" ]; then
              echo "    >> UNREACHABLE (connection failed/timed out)"; cat /tmp/err."$label" | sed 's/^/       /'
            elif grep -qiE "just a moment|cf-chl|challenge-platform|turnstile|cf_chl_opt|_cf_chl" "$body" 2>/dev/null; then
              echo "    >> CLOUDFLARE CHALLENGE (interstitial page; needs JS/Turnstile solve)"
            elif [ "$code" = "403" ] && curl -sS -I --max-time 15 -H "User-Agent: $ua" "$url" 2>/dev/null | grep -qi "server: *cloudflare"; then
              echo "    >> CLOUDFLARE HARD BLOCK (403 from Cloudflare edge)"
            elif [ "$code" = "503" ] || [ "$code" = "429" ]; then
              echo "    >> CLOUDFLARE RATE-LIMIT / UNDER-ATTACK ($code)"
            elif [ "$code" = "200" ]; then
              echo "    >> OK (200 — datacenter IP allowed through)"
            else
              echo "    >> OTHER ($code) — inspect manually"
            fi
            echo
          }

          # qimanhwa: the real question (Cloudflare-fronted SPA)
          probe "qimanhwa-default-ua" "https://qimanhwa.com/" "curl/$(curl --version | head -1 | awk '{print $2}')"
          probe "qimanhwa-browser-ua" "https://qimanhwa.com/" "$BROWSER_UA"

          # manhwanex: control (no Cloudflare; must be 200)
          probe "manhwanex-control"   "https://manhwanex.com/" "$BROWSER_UA"

      - name: Upload captured bodies
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curl-probe-bodies
          path: /tmp/*.html
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2 — headless browser probe. The realistic "can we actually scrape it?"
  # test: does a headless Chromium (with stealth) get past Cloudflare and render
  # qimanhwa's React SPA enough to expose its title / content?
  # ---------------------------------------------------------------------------
  headless-browser-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + stealth
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright-extra puppeteer-extra-plugin-stealth playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Render qimanhwa.com headless and report outcome
        run: |
          cat > probe.mjs <<'JS'
          import { addExtra } from 'playwright-extra';
          import { chromium as base } from 'playwright';
          import Stealth from 'puppeteer-extra-plugin-stealth';

          const chromium = addExtra(base);
          chromium.use(Stealth());

          const URL = 'https://qimanhwa.com/';
          const browser = await chromium.launch({ headless: true });
          const ctx = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
            viewport: { width: 1280, height: 800 },
          });
          const page = await ctx.newPage();
          let status = 'n/a';
          try {
            const resp = await page.goto(URL, { waitUntil: 'domcontentloaded', timeout: 45000 });
            status = resp ? resp.status() : 'no-response';
            // Give the SPA a moment to hydrate / CF a moment to clear.
            await page.waitForTimeout(8000);
            const title = await page.title();
            const bodyText = (await page.evaluate(() => document.body?.innerText || '')).slice(0, 300);
            const isChallenge = /just a moment|verify you are human|cf-chl|challenge/i.test(title + ' ' + bodyText);
            await page.screenshot({ path: 'qimanhwa-headless.png', fullPage: false });

            console.log('HTTP status   :', status);
            console.log('Page title    :', JSON.stringify(title));
            console.log('Body excerpt  :', JSON.stringify(bodyText));
            console.log('Verdict       :',
              isChallenge ? 'BLOCKED — Cloudflare challenge not cleared headless'
              : /qi manhwa|manhwa/i.test(title) ? 'SUCCESS — real qimanhwa content rendered'
              : 'INCONCLUSIVE — no challenge, but title not recognized (inspect screenshot)');
          } catch (err) {
            console.log('HTTP status   :', status);
            console.log('Verdict       : ERROR —', err.message);
          } finally {
            await browser.close();
          }
          JS
          node probe.mjs

      - name: Upload headless screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qimanhwa-headless-screenshot
          path: qimanhwa-headless.png
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3 — volume probe. Does a full series-scrape pattern (home -> series ->
  # several chapters, sequential full reloads from one datacenter IP) trip
  # Cloudflare rate-limiting / harder challenges? Also discovers qimanhwa's URL
  # structure and dumps real hydrated DOM as artifacts (the capture that
  # unblocks the parser).
  # ---------------------------------------------------------------------------
  volume-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + stealth
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright-extra puppeteer-extra-plugin-stealth playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Sequential scrape-pattern load test
        run: |
          mkdir -p capture
          cat > volume.mjs <<'JS'
          import { addExtra } from 'playwright-extra';
          import { chromium as base } from 'playwright';
          import Stealth from 'puppeteer-extra-plugin-stealth';
          import fs from 'node:fs';

          const chromium = addExtra(base);
          chromium.use(Stealth());
          const UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36';

          const browser = await chromium.launch({ headless: true });
          const ctx = await browser.newContext({ userAgent: UA, viewport: { width: 1280, height: 800 } });
          const page = await ctx.newPage();
          const results = [];

          async function visit(label, url, settleMs = 6000) {
            const t0 = Date.now();
            let status = 'n/a', cfm = '';
            try {
              const resp = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 45000 });
              status = resp ? resp.status() : 'no-response';
              cfm = resp ? (resp.headers()['cf-mitigated'] || '') : '';
              await page.waitForTimeout(settleMs);
            } catch (e) { status = 'ERR'; cfm = e.message.slice(0, 80); }
            const ms = Date.now() - t0;
            const title = await page.title().catch(() => '');
            const rec = { label, status, cfm, ms, title, url };
            results.push(rec);
            console.log(`[${label}] status=${status} cf-mitigated="${cfm}" ${ms}ms title="${title}"`);
            return rec;
          }

          // 1) Home + discover internal link structure
          await visit('home', 'https://qimanhwa.com/');
          fs.writeFileSync('capture/home.html', await page.content());
          const links = await page.$$eval('a[href]', as => as.map(a => a.getAttribute('href')).filter(Boolean));
          const internal = [...new Set(links)]
            .filter(h => h.startsWith('/') || h.includes('qimanhwa.com'))
            .map(h => h.startsWith('http') ? h : 'https://qimanhwa.com' + h);
          const prefixes = {};
          for (const h of internal) { try { const seg = new URL(h).pathname.split('/').filter(Boolean)[0] || '(root)'; prefixes[seg] = (prefixes[seg] || 0) + 1; } catch {} }
          console.log('URL path prefixes seen:', JSON.stringify(prefixes));

          // Heuristic: a series page has a 2-segment path that is not a nav item.
          const NAV = new Set(['browse', 'store', 'sign-in', 'signin', 'login', 'genres', 'search', 'about', 'contact', 'terms', 'privacy']);
          const seriesCandidates = [...new Set(internal)].filter(h => {
            try { const segs = new URL(h).pathname.split('/').filter(Boolean); return segs.length >= 2 && !NAV.has(segs[0]); } catch { return false; }
          });
          console.log('series candidates (first 8):', seriesCandidates.slice(0, 8));

          // 2) Visit a series page, discover chapter links
          let chapters = [];
          if (seriesCandidates.length) {
            await visit('series', seriesCandidates[0]);
            fs.writeFileSync('capture/series.html', await page.content());
            const clinks = await page.$$eval('a[href]', as => as.map(a => a.getAttribute('href')).filter(Boolean));
            chapters = [...new Set(clinks)]
              .filter(h => /chapter|\/ch[\.\-_]?\d|\/\d+(\/)?$/i.test(h))
              .map(h => h.startsWith('http') ? h : 'https://qimanhwa.com' + h);
            console.log(`discovered ${chapters.length} chapter links; first 5:`, chapters.slice(0, 5));
          } else {
            console.log('No series candidates found from homepage anchors (SPA may gate links behind JS interaction).');
          }

          // 3) Sequential chapter hits = the load test (full reloads, no pacing)
          const toHit = chapters.slice(0, 6);
          for (let i = 0; i < toHit.length; i++) {
            const r = await visit(`chapter-${i + 1}`, toHit[i], 4000);
            if (i === 0) fs.writeFileSync('capture/chapter.html', await page.content());
          }

          // Summary + verdict
          const flagged = results.filter(r => /challenge|block/i.test(r.cfm) || /^(4|5)/.test(String(r.status)) || r.status === 'ERR');
          console.log('\n==== VOLUME SUMMARY ====');
          console.log(`navigations=${results.length} flagged(4xx/5xx/challenge/err)=${flagged.length}`);
          console.log(JSON.stringify(results, null, 2));
          console.log('VERDICT:', flagged.length === 0
            ? 'CLEAN — no rate-limiting or challenge escalation across the sequence'
            : `DEGRADED — ${flagged.length}/${results.length} navigations were challenged/blocked (see records)`);

          await browser.close();
          process.exit(0);
          JS
          node volume.mjs

      - name: Upload captured DOM (home/series/chapter)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qimanhwa-real-dom-capture
          path: capture/*.html
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4 — API probe. Confirms qimanhwa's /api/v1 is usable once Cloudflare is
  # cleared, and dumps the chapter-list + single-chapter JSON so we know the
  # exact data model for an API-first adapter.
  # ---------------------------------------------------------------------------
  api-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright + stealth
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright-extra puppeteer-extra-plugin-stealth playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium
      - name: Fetch /api/v1 endpoints from a CF-cleared context
        run: |
          mkdir -p api
          cat > api.mjs <<'JS'
          import { addExtra } from 'playwright-extra';
          import { chromium as base } from 'playwright';
          import Stealth from 'puppeteer-extra-plugin-stealth';
          import fs from 'node:fs';
          const chromium = addExtra(base); chromium.use(Stealth());
          const UA='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36';
          const browser = await chromium.launch({ headless:true });
          const ctx = await browser.newContext({ userAgent:UA });
          const page = await ctx.newPage();
          // Clear CF by loading the SPA origin first.
          await page.goto('https://qimanhwa.com/', { waitUntil:'domcontentloaded', timeout:45000 });
          await page.waitForTimeout(6000);
          const SLUG='office-worker-who-sees-fate';
          const endpoints = {
            series:   `https://qimanhwa.com/api/v1/series/${SLUG}`,
            chapters: `https://qimanhwa.com/api/v1/series/${SLUG}/chapters`,
            chapter0: `https://qimanhwa.com/api/v1/series/${SLUG}/chapters/chapter-0`,
          };
          for (const [name,url] of Object.entries(endpoints)) {
            const r = await page.evaluate(async (u) => {
              try { const res = await fetch(u, { headers:{accept:'application/json'} });
                const txt = await res.text(); return { status:res.status, ct:res.headers.get('content-type'), txt }; }
              catch(e){ return { status:'ERR', txt:String(e) }; }
            }, url);
            console.log(`\n[${name}] ${url}\n  status=${r.status} content-type=${r.ct}`);
            console.log('  body (first 700 chars):', (r.txt||'').slice(0,700).replace(/\n/g,' '));
            fs.writeFileSync(`api/${name}.json`, r.txt||'');
          }
          await browser.close(); process.exit(0);
          JS
          node api.mjs
      - name: Upload API JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qimanhwa-api-json
          path: api/*.json
          if-no-files-found: ignore
          retention-days: 7
