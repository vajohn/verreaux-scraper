services:
  worker:
    build: .
    image: verreaux-scraper:dev
    restart: unless-stopped
    environment:
      VERREAUX_ROOT: /work
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
    volumes:
      - ./data/jobs:/work/jobs
      - ./data/done:/work/done
      - ./data/state:/work/state
    depends_on:
      - flaresolverr
    command: ["node", "scripts/pi-watcher.mjs"]

  api:
    build: .
    image: verreaux-scraper:dev
    restart: unless-stopped
    environment:
      VERREAUX_ROOT: /work
      PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SCRAPE_TOTP_SECRET: ${SCRAPE_TOTP_SECRET:?set SCRAPE_TOTP_SECRET in .env}
      DATABASE_URL: postgres://verreaux:${POSTGRES_PASSWORD}@postgres:5432/verreaux
    volumes:
      - ./data/jobs:/work/jobs
      - ./data/done:/work/done
      - ./data/state:/work/state
    ports:
      - "8080:8080"
    depends_on:
      - flaresolverr
      - postgres
    command: ["node", "scripts/pi-api.mjs"]

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: verreaux
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: verreaux
    volumes:
      - ./data/pg:/var/lib/postgresql/data
