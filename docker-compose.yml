services:
  worker:
    build: .
    image: verreaux-scraper:dev
    restart: unless-stopped
    environment:
      VERREAUX_ROOT: /work
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
    volumes:
      - ./data/jobs:/work/jobs
      - ./data/done:/work/done
      - ./data/state:/work/state
    depends_on:
      - flaresolverr
    command: ["node", "scripts/pi-watcher.mjs"]

  api:
    build: .
    image: verreaux-scraper:dev
    restart: unless-stopped
    environment:
      VERREAUX_ROOT: /work
      PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SCRAPE_TOTP_SECRET: ${SCRAPE_TOTP_SECRET:?set SCRAPE_TOTP_SECRET in .env}
      DATABASE_URL: postgres://verreaux:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/verreaux
    volumes:
      - ./data/jobs:/work/jobs
      - ./data/done:/work/done
      - ./data/state:/work/state
    ports:
      - "8080:8080"
    depends_on:
      flaresolverr:
        condition: service_started
      postgres:
        condition: service_healthy
    command: ["node", "scripts/pi-api.mjs"]

  # LAN-only HTTPS front door (Caddy, built-in local CA). Lets the HTTPS PWA
  # reach the API over the LAN without mixed-content blocking. The Funnel still
  # serves api:8080 for off-LAN access — Caddy is an additional door, not a
  # replacement. See Caddyfile + ai/lan-https-caddy-setup.md.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data       # local CA + issued certs (root.crt lives here)
      - ./data/caddy/config:/config
    depends_on:
      - api

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: verreaux
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: verreaux
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    healthcheck:
      # Lets the api `depends_on: condition: service_healthy` wait for real
      # readiness instead of crash-looping on a cold boot.
      test: ["CMD-SHELL", "pg_isready -U verreaux -d verreaux"]
      interval: 5s
      timeout: 3s
      retries: 5
